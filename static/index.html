<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Styling Assistant</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Supabase JS (auth) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        Babel.registerPreset('jsx-classic', {
            presets: [[Babel.availablePresets.react, { runtime: 'classic' }]]
        });
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Wada Sanzo inspired palette
                        wada: {
                            mustard: '#E0AC4D',
                            carmine: '#A32938',
                            celadon: '#7B9B82',
                            ivory: '#F4ECE1',
                            navy: '#1A365D',
                            charcoal: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #F4ECE1;
            color: #333333;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-presets="jsx-classic" src="app.js"></script>
</body>
</html>
